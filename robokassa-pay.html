<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата</title>
<!-- MD5 для генерации подписи на клиенте -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    padding: 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 6px; }
  .desc { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
  .amount {
    font-size: 38px; font-weight: 700; color: #1a1a2e;
    margin-bottom: 24px;
  }
  .amount span { font-size: 22px; color: #6b7280; }
  button {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #00a651;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #009449; }
  .note { margin-top: 16px; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>
  <div class="card">
    <h1>Оплата заказа</h1>
    <p class="desc" id="desc">Услуга</p>
    <div class="amount"><span>₽</span> <span id="amountView">350</span></div>
    <button onclick="pay()">Оплатить</button>
    <p class="note">Безопасная оплата через Робокассу</p>
  </div>

<script>
  // ===== НАСТРОЙКИ — подставить данные клиента из кабинета Робокассы =====
  const CONFIG = {
    merchantLogin: "ВАШ_ЛОГИН_МАГАЗИНА", // MerchantLogin
    password1:     "ВАШ_ПАРОЛЬ_1",       // Пароль #1
    outSum:        "350.00",             // сумма
    description:   "Оплата услуги",       // описание заказа
    isTest:        1                     // 1 = тестовый режим, 0 = боевой
  };
  // =====================================================================

  document.getElementById("amountView").textContent = CONFIG.outSum.replace(".00","");
  document.getElementById("desc").textContent = CONFIG.description;

  function pay() {
    const invId = 0; // 0 = Робокасса сама присвоит номер счёта
    // Подпись: MerchantLogin:OutSum:InvId:Пароль#1
    const signature = md5(
      CONFIG.merchantLogin + ":" +
      CONFIG.outSum + ":" +
      invId + ":" +
      CONFIG.password1
    );

    const params = new URLSearchParams({
      MerchantLogin: CONFIG.merchantLogin,
      OutSum: CONFIG.outSum,
      InvId: invId,
      Description: CONFIG.description,
      SignatureValue: signature,
      IsTest: CONFIG.isTest
    });

    window.location.href = "https://auth.robokassa.ru/Merchant/Index.aspx?" + params.toString();
  }
</script>
</body>
</html>
